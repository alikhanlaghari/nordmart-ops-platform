name: NordMart CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  product-service:
    name: Build Product Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: product-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://nordmart:nordmart_password@localhost:5432/nordmart_db?schema=public

      - name: Build Docker image
        run: docker build -t nordmart-product-service-ci .

  api-gateway:
    name: Build API Gateway
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t nordmart-api-gateway-ci .